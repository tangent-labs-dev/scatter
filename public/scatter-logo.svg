<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-labelledby="title desc">
  <title id="title">Scatter logo</title>
  <desc id="desc">A pixel-styled scattered letter S mark.</desc>
  <rect width="24" height="24" fill="#0a0a0a" />

  <!-- Main pixel S -->
  <rect x="5" y="4" width="3" height="3" fill="#f4f4f5" />
  <rect x="8" y="4" width="3" height="3" fill="#f4f4f5" />
  <rect x="11" y="4" width="3" height="3" fill="#f4f4f5" />
  <rect x="14" y="4" width="3" height="3" fill="#f4f4f5" />

  <rect x="5" y="7" width="3" height="3" fill="#f4f4f5" />
  <rect x="5" y="10" width="3" height="3" fill="#f4f4f5" />

  <rect x="8" y="10" width="3" height="3" fill="#f4f4f5" />
  <rect x="11" y="10" width="3" height="3" fill="#f4f4f5" />
  <rect x="14" y="10" width="3" height="3" fill="#f4f4f5" />

  <rect x="14" y="13" width="3" height="3" fill="#f4f4f5" />
  <rect x="14" y="16" width="3" height="3" fill="#f4f4f5" />

  <rect x="5" y="16" width="3" height="3" fill="#f4f4f5" />
  <rect x="8" y="16" width="3" height="3" fill="#f4f4f5" />
  <rect x="11" y="16" width="3" height="3" fill="#f4f4f5" />

  <!-- Scattered pixels -->
  <rect x="3" y="2" width="2" height="2" fill="#f4f4f5" opacity="0.9" />
  <rect x="18" y="2" width="2" height="2" fill="#f4f4f5" opacity="0.8" />
  <rect x="2" y="12" width="2" height="2" fill="#f4f4f5" opacity="0.7" />
  <rect x="19" y="11" width="2" height="2" fill="#f4f4f5" opacity="0.9" />
  <rect x="4" y="20" width="2" height="2" fill="#f4f4f5" opacity="0.75" />
  <rect x="18" y="19" width="2" height="2" fill="#f4f4f5" opacity="0.85" />
</svg>
